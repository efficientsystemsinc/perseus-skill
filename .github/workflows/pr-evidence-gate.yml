name: PR evidence gate

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  evidence:
    permissions:
      contents: read
      pull-requests: read
    uses: efficientsystemsinc/.github/.github/workflows/pr-evidence-gate.yml@73bde24d57f8e49be28b2c3b80735758da16ef18
    with:
      mode: enforce
